<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Joker Gems</title>
    <style>
        :root { --primary: #6b21a8; --accent: #fbbf24; --bg: #0f0a1a; --card-bg: rgba(255, 255, 255, 0.05); --text: #e2e8f0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        nav { padding: 20px; display: flex; justify-content: center; gap: 15px; background: rgba(0,0,0,0.2); }
        nav a { color: var(--text); text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: 0.3s; border: 1px solid transparent; }
        nav a:hover, nav a.active { border-color: var(--accent); color: var(--accent); }
        .container { max-width: 600px; margin: 80px auto; padding: 0 20px; }
        .support-card { background: var(--card-bg); padding: 50px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { display: inline-block; background: var(--accent); color: #000; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="marketing.html">Marketing</a>
        <a href="support.html" class="active">Support</a>
        <a href="privacy.html">Privacy</a>
    </nav>
    <div class="container">
        <div class="support-card">
            <h1>Need Assistance?</h1>
            <p>We are here to help you with any questions or feedback regarding Joker Gems.</p>
            <p>Direct contact with the developer:</p>
            <a href="mailto:portoma@atomicmail.io" class="btn">Contact Serhii Polovko</a>
            <p style="margin-top: 30px; opacity: 0.7;">Email: portoma@atomicmail.io</p>
        </div>
    </div>
</body>
</html>
